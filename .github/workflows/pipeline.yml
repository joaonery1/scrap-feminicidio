name: Pipeline

on:
  schedule:
    - cron: "0 9 * * *"   # todo dia às 09h UTC (06h BRT)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      IG_SESSION_ID: ${{ secrets.IG_SESSION_ID }}

    steps:
      - uses: actions/checkout@v4

      # — Scrapers Go (SSP-SE, G1, Instagram, dados.gov.br) —
      - uses: actions/setup-go@v5
        with:
          go-version-file: scrapers/go.mod

      - name: Rodar scrapers Go
        working-directory: scrapers
        run: go run ./cmd/scrapshe

      # — Pipeline Python (cleaner + exporter) —
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Executar pipeline Python
        run: python pipeline/run.py

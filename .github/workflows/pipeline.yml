name: Pipeline

on:
  schedule:
    - cron: "0 */2 * * *"   # a cada 2h
  workflow_dispatch:
    inputs:
      skip_instagram:
        description: "Pular Instagram (evitar 429)"
        type: boolean
        default: false

env:
  POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
  POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  # Instagram só roda no job dedicado (cron às 9h) ou quando IG_SESSION_ID está presente
  IG_SESSION_ID: ${{ secrets.IG_SESSION_ID }}

jobs:
  scrapers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: scrapers/go.mod

      - name: Rodar scrapers Go
        working-directory: scrapers
        run: go run ./cmd/scrapshe

  pipeline:
    runs-on: ubuntu-latest
    needs: scrapers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Executar pipeline Python
        run: python pipeline/run.py

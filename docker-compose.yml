services:
  postgres:
    image: postgres:16-alpine
    container_name: scrapshe_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scrapshe}
      POSTGRES_USER: ${POSTGRES_USER:-scrapshe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scrapshe} -d ${POSTGRES_DB:-scrapshe}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
